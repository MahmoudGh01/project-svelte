<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Hogwarts Crest inspired design -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ECB939;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#946B2D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield background -->
  <path d="M50 10 L20 25 L20 70 Q20 80 30 85 L50 90 L70 85 Q80 80 80 70 L80 25 Z" 
        fill="#0B0B0F" stroke="url(#goldGradient)" stroke-width="3"/>
  
  <!-- Lightning bolt -->
  <path d="M45 25 L35 45 L45 45 L40 65 L55 40 L45 40 L50 25 Z" 
        fill="#ECB939" stroke="#7F0909" stroke-width="1"/>
  
  <!-- Stars around the lightning -->
  <circle cx="35" cy="35" r="2" fill="#ECB939"/>
  <circle cx="65" cy="35" r="2" fill="#ECB939"/>
  <circle cx="30" cy="55" r="1.5" fill="#ECB939"/>
  <circle cx="70" cy="55" r="1.5" fill="#ECB939"/>
  
  <!-- House unity symbol at bottom -->
  <rect x="25" y="75" width="12" height="8" fill="#7F0909"/> <!-- Gryffindor -->
  <rect x="37" y="75" width="12" height="8" fill="#2A623D"/> <!-- Slytherin -->
  <rect x="51" y="75" width="12" height="8" fill="#0E1A40"/> <!-- Ravenclaw -->
  <rect x="63" y="75" width="12" height="8" fill="#ECB939"/> <!-- Hufflepuff -->
</svg>